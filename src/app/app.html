<div class="app-shell">
  <div class="top-bar">
    @if (matchStore.hasActiveMatch()) {
      <button matIconButton (click)="confirmEndMatch()" aria-label="Spiel beenden">
        <mat-icon>close</mat-icon>
      </button>
    }
    <div class="theme-toggle">
      <mat-icon>{{ theme.isDark() ? 'dark_mode' : 'light_mode' }}</mat-icon>
      <mat-slide-toggle
        [checked]="theme.isDark()"
        (change)="theme.toggle()"
        aria-label="Dark Mode umschalten"
      />
    </div>
  </div>
  <div class="app-content">
    <router-outlet />
  </div>
</div>
