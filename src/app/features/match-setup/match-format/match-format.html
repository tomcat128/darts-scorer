<div class="match-format">
  <mat-form-field appearance="outline" class="best-of-field">
    <mat-label>Best of (Legs)</mat-label>
    <input
      matInput
      type="number"
      min="1"
      step="2"
      [value]="selection().bestOfLegs"
      (change)="setBestOfLegs($any($event.target).value)"
    />
  </mat-form-field>

  <mat-slide-toggle
    [checked]="selection().useSets"
    (change)="setUseSets($event.checked)"
  >
    Sets verwenden
  </mat-slide-toggle>

  @if (selection().useSets) {
    <mat-form-field appearance="outline" class="best-of-field">
      <mat-label>Best of (Sets)</mat-label>
      <input
        matInput
        type="number"
        min="1"
        step="2"
        [value]="selection().bestOfSets"
        (change)="setBestOfSets($any($event.target).value)"
      />
    </mat-form-field>
  }
</div>
