<div class="roster-page">
  <h1>Spieler</h1>

  <div class="player-list">
    @for (player of roster.players(); track player.id) {
      <div class="player-row">
        @if (editingPlayerId() === player.id) {
          <input
            class="rename-input"
            [value]="editingName()"
            (input)="editingName.set($any($event.target).value)"
            (keyup.enter)="confirmRename(player.id)"
            (keyup.escape)="cancelRename()"
            autofocus
          />
          <span class="item-actions">
            <button matIconButton (click)="confirmRename(player.id)" aria-label="Umbenennen speichern">
              <mat-icon>check</mat-icon>
            </button>
            <button matIconButton (click)="cancelRename()" aria-label="Umbenennen abbrechen">
              <mat-icon>close</mat-icon>
            </button>
          </span>
        } @else {
          <span class="player-name">{{ player.name }}</span>
          <span class="item-actions">
            <button matIconButton (click)="startRename(player)" aria-label="Spieler umbenennen">
              <mat-icon>edit</mat-icon>
            </button>
            <button matIconButton (click)="deletePlayer(player.id)" aria-label="Spieler löschen">
              <mat-icon>delete</mat-icon>
            </button>
          </span>
        }
      </div>
    } @empty {
      <p class="empty-hint">Noch keine Spieler angelegt.</p>
    }
  </div>

  <div class="add-player">
    <mat-form-field appearance="outline" class="name-field">
      <mat-label>Neuer Spieler</mat-label>
      <input matInput #nameInput (keyup.enter)="addPlayer(nameInput)" />
    </mat-form-field>
    <button matButton="filled" (click)="addPlayer(nameInput)">Hinzufügen</button>
  </div>

  <button
    matButton="filled"
    class="start-button"
    [disabled]="roster.players().length === 0"
    (click)="goToNewMatch()"
  >
    Neue Partie
  </button>
</div>
