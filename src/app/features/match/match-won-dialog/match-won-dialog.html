<h2 mat-dialog-title>🎯 {{ data.winnerName }} gewinnt!</h2>
<mat-dialog-content>Die Partie ist beendet.</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton (click)="close('done')">Fertig</button>
  <button matButton="filled" (click)="close('new-match')">Neue Partie</button>
</mat-dialog-actions>
